name: Extension Build

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build extension
        run: npm run build:extension

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: indexlens-extension-${{ github.sha }}
          path: dist/
          if-no-files-found: error

  release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into package.json
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Stamp version into manifest.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' public/manifest.json > tmp.json
          mv tmp.json public/manifest.json

      - name: Build extension
        run: npm run build:extension

      - name: Zip dist
        run: cd dist && zip -r ../indexlens-v${{ steps.version.outputs.version }}.zip .

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "indexlens-v${{ steps.version.outputs.version }}.zip"
